version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: storyverse_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: storyverse
      POSTGRES_PASSWORD: storyverse123
      POSTGRES_DB: storyverse_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyverse -d storyverse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storyverse_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://storyverse:storyverse123@db:5432/storyverse_db
      SECRET_KEY: change-this-in-production-32-chars-minimum
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.1:8b
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storyverse_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
